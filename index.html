<!DOCTYPE html>
<html lang="ru" style="background:#04020a">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Selcio">
<meta name="theme-color" content="#04020a">
<title>Selcio</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-startup-image" href="/splash.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#04020a;
  --acc:#e8722a;
  --muted:rgba(255,255,255,0.42);
  --muted2:rgba(255,255,255,0.18);
  --text:#f2ede8;
  --sw:280px;
  --hf:'Syne',sans-serif;
  --bf:'DM Sans',sans-serif;
}

html{height:100%;width:100%;overflow:hidden;background:#04020a;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:var(--bf);background:#04020a;color:var(--text);
  position:fixed;top:0;left:0;right:0;bottom:0;
  overflow:hidden;margin:0;padding:0;
  -webkit-font-smoothing:antialiased;letter-spacing:.01em}

/* ─── BG ─── */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-base{position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 65% 45%, rgba(80,22,5,.85) 0%, rgba(28,8,3,.65) 40%, transparent 72%),
    radial-gradient(ellipse 50% 60% at 20% 60%, rgba(15,5,30,.7) 0%, transparent 60%),
    #04020a}
.bg-noise{position:absolute;inset:0;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;will-change:transform}
.orb-1{width:600px;height:600px;background:rgba(160,50,8,.1);top:-100px;right:-100px;animation:o1 12s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:rgba(8,3,20,.5);bottom:-80px;left:-60px;animation:o2 15s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,25px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}

/* ─── STARS ─── */
#cv{position:fixed;inset:0;z-index:2;pointer-events:none;transition:opacity 1.2s ease;opacity:0;animation:cv-fade-in 2.5s ease-out 0.4s forwards}
@keyframes cv-fade-in{from{opacity:0}to{opacity:1}}
#cv.hide{opacity:0!important;animation:none}

/* ─── SIDEBAR ─── */
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sw);z-index:60;
  background:rgba(6,3,14,.88);
  border-right:1px solid rgba(255,255,255,.055);
  backdrop-filter:blur(48px) saturate(160%);
  -webkit-backdrop-filter:blur(48px) saturate(160%);
  display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform .42s cubic-bezier(.4,0,.2,1);
  overflow:hidden}
.sb.open{transform:translateX(0)}
.sb-ov{display:none;position:fixed;inset:0;z-index:55;background:rgba(0,0,0,.5);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;transition:opacity .38s ease}
.sb-ov.show{display:block;opacity:1}

.sb-head{padding:max(22px,env(safe-area-inset-top)) 18px 16px;
  border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
.sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sb-logo{width:32px;height:32px;border-radius:9px;object-fit:cover;flex-shrink:0;
  box-shadow:0 0 18px rgba(220,100,25,.3),0 0 0 1px rgba(255,255,255,.08)}
.sb-name{font-family:var(--hf);font-size:16px;font-weight:800;letter-spacing:-.3px;
  background:linear-gradient(90deg,#fff,rgba(255,200,140,.85));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-badge{margin-left:auto;font-size:8.5px;font-weight:700;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--acc);
  background:rgba(220,100,25,.08);border:1px solid rgba(220,100,25,.18);
  padding:3px 7px;border-radius:5px;flex-shrink:0;font-family:var(--hf)}

.sb-new{width:100%;padding:11px 14px;
  background:linear-gradient(135deg,rgba(200,80,15,.15),rgba(150,50,5,.08));
  border:1px solid rgba(220,100,25,.18);
  border-radius:12px;color:var(--text);
  font-size:13px;font-weight:500;font-family:var(--bf);
  cursor:pointer;display:flex;align-items:center;gap:9px;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 12px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.06)}
.sb-new:hover{background:linear-gradient(135deg,rgba(200,80,15,.25),rgba(150,50,5,.18));border-color:rgba(220,100,25,.32);transform:translateY(-1px)}
.sb-new:active{transform:scale(.97)}

.sb-hist{flex:1;overflow-y:auto;padding:8px 10px 16px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.sb-hist::-webkit-scrollbar{display:none}

.grp{margin-bottom:12px}
.grp-label{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted2);padding:5px 8px 4px;display:flex;align-items:center;gap:6px}
.grp-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.04)}

.hi{padding:8px 9px;border-radius:10px;cursor:pointer;
  display:flex;align-items:center;gap:8px;margin-bottom:1px;
  transition:all .2s cubic-bezier(.4,0,.2,1);min-width:0;position:relative}
.hi:hover{background:rgba(255,255,255,.04)}
.hi.on{background:rgba(220,100,25,.08);border-left:2px solid rgba(220,100,25,.5)}
.hi:active{transform:scale(.97)}

.hi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.12);transition:background .2s}
.hi.on .hi-dot{background:var(--acc)}
.hi:hover .hi-dot{background:rgba(255,255,255,.3)}
.hi-t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px;color:rgba(255,255,255,.45)}
.hi.on .hi-t{color:rgba(255,255,255,.82)}
.hi:hover .hi-t{color:rgba(255,255,255,.7)}
.hi-x{flex-shrink:0;opacity:0;background:none;border:none;cursor:pointer;color:var(--muted2);padding:3px;display:flex;border-radius:5px;transition:all .15s}
.hi:hover .hi-x{opacity:1}
.hi-x:hover{color:#f05555}

.sb-empty{padding:32px 18px;font-size:13px;color:var(--muted2);text-align:center;line-height:1.9;font-weight:300}
.sb-empty-ico{font-size:28px;display:block;margin-bottom:8px;opacity:.5}

.sb-foot{padding:14px 18px max(14px,env(safe-area-inset-bottom));
  border-top:1px solid rgba(255,255,255,.04);
  font-size:10.5px;color:var(--muted2);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between}
.sb-foot-dot{width:5px;height:5px;border-radius:50%;background:rgba(100,220,100,.5);box-shadow:0 0 6px rgba(100,220,100,.4)}

/* ─── MAIN ─── */
.main{position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  overflow:hidden;z-index:10;margin:0;padding:0}

.hdr{display:flex;align-items:center;gap:10px;
  padding:max(env(safe-area-inset-top),14px) 18px 12px;
  flex-shrink:0;position:relative;z-index:20}
.hdr-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.hdr-btn{width:38px;height:38px;border-radius:11px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .22s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.hdr-btn:hover{background:rgba(255,255,255,.08);color:var(--text);transform:scale(1.05)}
.hdr-btn:active{transform:scale(.93)}

.hdr-li{width:28px;height:28px;border-radius:8px;object-fit:cover;
  box-shadow:0 0 12px rgba(220,100,25,.28),0 0 0 1px rgba(255,255,255,.07)}
.hdr-ln{font-family:var(--hf);font-size:17px;font-weight:800;letter-spacing:-.4px;
  background:linear-gradient(90deg,#fff 0%,rgba(255,200,140,.9) 50%,rgba(220,110,50,.85) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s linear infinite}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.hdr-b{font-size:8.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--acc);background:rgba(220,100,25,.09);border:1px solid rgba(220,100,25,.2);
  padding:3px 7px;border-radius:5px;font-family:var(--hf)}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.clock{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:300}

/* ─── CONTENT ─── */
.content{flex:1;display:flex;flex-direction:column;align-items:center;
  overflow:hidden;padding:0 16px;min-height:0;width:100%}
.scroll-zone{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
  width:100%;max-width:800px;align-self:center;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.scroll-zone::-webkit-scrollbar{display:none}

/* ─── HERO ─── */
.hero{display:flex;flex-direction:column;align-items:center;text-align:center;
  justify-content:center;min-height:100%;width:100%;padding:20px 8px;
  gap:clamp(10px,2.2vh,22px)}
.hero-orb-wrap{position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.hero-img{width:clamp(70px,17vw,100px);height:clamp(70px,17vw,100px);
  border-radius:clamp(18px,4.5vw,26px);object-fit:cover;display:block;
  position:relative;z-index:2;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 0 1px rgba(220,100,25,.1),0 8px 40px rgba(0,0,0,.6),0 0 60px rgba(200,70,10,.12);
  transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.hero-img:hover{transform:scale(1.05) translateY(-3px)}
.hero-ring{display:none}
.hero-ring-2{display:none}
@keyframes rp{0%,100%{opacity:.4;transform:scale(.97)}50%{opacity:1;transform:scale(1.03)}}

.hero-title{font-family:var(--hf);
  font-size:clamp(36px,9vw,72px);
  font-weight:800;letter-spacing:-2px;line-height:.95;
  background:linear-gradient(90deg,#fff 0%,rgba(255,215,160,.92) 18%,rgba(235,125,55,.88) 36%,rgba(255,175,80,.92) 52%,rgba(255,255,255,.95) 68%,rgba(255,200,120,.9) 84%,#fff 100%);
  background-size:220% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4.5s linear infinite}
.hero-sub{font-size:clamp(13px,3.5vw,15px);color:var(--muted);
  max-width:340px;line-height:1.7;font-weight:300}

/* ─── MESSAGES ─── */
.msgs{display:flex;flex-direction:column;gap:14px;width:100%;padding:18px 0 10px;box-sizing:border-box}
.msg{display:flex;gap:10px;align-items:flex-start;animation:mup .35s cubic-bezier(.34,1.3,.64,1)}
.msg.user{flex-direction:row-reverse}
@keyframes mup{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden}
.av.ai img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.av.usr{font-family:var(--hf);
  background:linear-gradient(135deg,rgba(200,75,12,.3),rgba(160,45,5,.4));
  border:1px solid rgba(220,100,25,.22);color:rgba(255,190,120,.9)}

.bub{max-width:80%;padding:12px 16px;border-radius:20px;
  font-size:14.5px;line-height:1.75;word-break:break-word;font-weight:300}
.msg.ai .bub{background:rgba(255,255,255,.038);
  border:1px solid rgba(255,255,255,.09);
  border-top-color:rgba(255,255,255,.14);
  border-radius:4px 20px 20px 20px;
  backdrop-filter:blur(32px) saturate(160%);
  -webkit-backdrop-filter:blur(32px) saturate(160%);
  box-shadow:0 4px 24px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.09);
  color:rgba(255,255,255,.88)}
.msg.user .bub{background:linear-gradient(135deg,rgba(180,62,10,.5),rgba(130,38,5,.62));
  border:1px solid rgba(220,100,25,.22);
  border-top-color:rgba(255,150,70,.25);
  border-radius:20px 4px 20px 20px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 4px 24px rgba(150,50,5,.18),inset 0 1px 0 rgba(255,160,80,.1)}
.bub img{max-width:100%;border-radius:12px;margin-top:8px;display:block}
.bub a{color:rgba(230,160,80,.9);text-decoration:none;border-bottom:1px solid rgba(230,160,80,.28);transition:all .2s}
.bub a:hover{color:#fff}
.bub strong{font-weight:500;color:#fff}
.bub code{background:rgba(255,255,255,.07);padding:1px 6px;border-radius:5px;font-size:13px;font-family:monospace}

.sources{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.src-label{font-size:9.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.1px;margin-bottom:3px;font-weight:600;font-family:var(--hf)}
.src-link{display:flex;align-items:center;gap:8px;padding:7px 11px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:10px;text-decoration:none;color:var(--muted);font-size:12px;
  transition:all .22s ease;backdrop-filter:blur(10px)}
.src-link:hover{background:rgba(220,100,25,.08);border-color:rgba(220,100,25,.2);color:var(--text);transform:translateX(2px)}
.src-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.src-domain{font-size:10px;color:var(--muted2);flex-shrink:0}

.cur{display:inline-block;width:2px;height:15px;background:rgba(230,110,40,.9);
  margin-left:2px;vertical-align:text-bottom;animation:cb .58s step-end infinite;border-radius:1px}
@keyframes cb{0%,100%{opacity:1}50%{opacity:0}}
.dot{display:inline-block;width:5px;height:5px;background:rgba(220,120,50,.85);
  border-radius:50%;animation:db 1.3s ease-in-out infinite;margin-right:3px}
.dot:nth-child(2){animation-delay:.22s}.dot:nth-child(3){animation-delay:.44s}
@keyframes db{0%,80%,100%{opacity:.1;transform:scale(.75)}40%{opacity:1;transform:scale(1.15)}}

.searching{display:flex;align-items:center;gap:8px;padding:9px 13px;
  background:rgba(220,100,25,.06);border:1px solid rgba(220,100,25,.12);
  border-radius:12px;font-size:12.5px;color:rgba(220,145,75,.9);
  animation:sp 1.6s ease-in-out infinite;font-weight:300}
@keyframes sp{0%,100%{opacity:.6}50%{opacity:1}}

/* ─── INPUT ZONE ─── */
.inp-zone{width:100%;max-width:800px;align-self:center;flex-shrink:0;
  padding:8px 0 8px;
  display:flex;flex-direction:column;gap:11px}
.sugs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.sugs.gone{display:none}
.sug{padding:7px 15px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.09);
  border-top-color:rgba(255,255,255,.14);
  border-radius:22px;color:rgba(255,255,255,.4);
  font-size:12.5px;cursor:pointer;font-family:var(--bf);font-weight:300;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:all .25s cubic-bezier(.34,1.2,.64,1);
  white-space:nowrap}
.sug:hover{background:rgba(220,100,25,.1);border-color:rgba(220,100,25,.25);color:rgba(255,255,255,.82);transform:translateY(-2px)}
.sug:active{transform:scale(.95)}

.img-prev{display:none;position:relative;width:fit-content}
.img-prev.show{display:block}
.img-prev img{height:64px;border-radius:10px;border:1px solid rgba(220,100,25,.25);display:block}
.rm-img{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#e05555;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px}

/* ═══ THE GLASS PANEL ═══ */
.inp-glass{position:relative;border-radius:24px}

/* OUTER GLOW — surrounds panel, intensifies on focus + key */
.inp-aura{
  position:absolute;inset:-3px;border-radius:27px;
  pointer-events:none;z-index:0;
  background:linear-gradient(135deg,rgba(220,100,25,.4),rgba(255,170,80,.5),rgba(220,100,25,.3));
  opacity:0;
  filter:blur(14px);
  transition:opacity 1.2s cubic-bezier(.4,0,.2,1);
}
.inp-glass:focus-within .inp-aura{opacity:.5}
.inp-glass.tap .inp-aura{opacity:.95;transition:opacity 80ms ease-out}

/* GLASS PANEL — looks REAL */
.inp-panel{
  position:relative;z-index:1;
  border-radius:24px;
  background:transparent;
  border:1px solid rgba(255,255,255,.18);
  border-top-color:rgba(255,255,255,.32);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.14),
    0 4px 24px rgba(0,0,0,.2);
}

/* Top edge highlight (looks like wet glass) */
.inp-panel::before{
  content:'';position:absolute;top:0;left:5%;right:5%;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.5) 50%,transparent 100%);
  z-index:3;pointer-events:none;
}

/* Inner shine — subtle gloss across surface */


textarea#inp{display:block;width:100%;background:transparent;border:none;outline:none;
  padding:16px 18px 14px;font-family:var(--bf);font-size:15px;color:var(--text);
  resize:none;min-height:52px;max-height:130px;line-height:1.55;font-weight:300;
  -webkit-appearance:none;position:relative;z-index:4}
textarea#inp::placeholder{color:rgba(255,255,255,.32)}

.inp-toolbar{display:flex;align-items:center;padding:8px 12px 12px;gap:6px;position:relative;z-index:4}
.iab{height:36px;border:none;border-radius:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .22s cubic-bezier(.34,1.2,.64,1);
  flex-shrink:0;background:transparent}
.iab:hover{background:rgba(255,255,255,.08);color:var(--text);transform:scale(1.08)}
.iab:active{transform:scale(.91)}
.iab.icon-btn{width:36px}
.iab.send{margin-left:auto;padding:0 18px;min-width:44px;
  background:linear-gradient(135deg,#7a2005,#c85a18,#e87828);color:#fff;border-radius:12px;
  font-family:var(--hf);font-size:13px;font-weight:700;letter-spacing:.3px;
  box-shadow:0 3px 14px rgba(200,80,20,.4),inset 0 1px 0 rgba(255,200,100,.18);gap:7px}
.iab.send:hover{box-shadow:0 5px 22px rgba(200,80,20,.55);transform:scale(1.04) translateY(-1px)}
.iab.send:active{transform:scale(.94)}
.iab.send:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* ─── VOICE ─── */
.vov{display:none;position:fixed;inset:0;z-index:100;background:rgba(3,1,8,.95);
  backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);
  flex-direction:column;align-items:center;justify-content:center;gap:30px}
.vov.open{display:flex;animation:vin .38s cubic-bezier(.4,0,.2,1)}
@keyframes vin{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.v-orb{width:132px;height:132px;border-radius:50%;
  background:radial-gradient(circle at 36% 36%,#8a2605,rgba(70,15,2,.9));
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(220,100,25,.18);
  box-shadow:0 0 0 1px rgba(220,100,25,.1),0 0 50px rgba(180,55,8,.2),inset 0 1px 0 rgba(255,180,80,.1)}
.v-orb.listen{animation:vp 1.4s ease-in-out infinite}
.v-orb.speak{animation:vs .8s ease-in-out infinite}
@keyframes vp{0%,100%{box-shadow:0 0 0 0 rgba(220,100,25,.4)}50%{box-shadow:0 0 0 28px rgba(220,100,25,0)}}
@keyframes vs{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.v-status{font-family:var(--hf);font-size:20px;font-weight:700;color:rgba(255,255,255,.85)}
.v-text{font-size:14px;color:var(--muted);max-width:380px;text-align:center;line-height:1.65;min-height:22px;font-weight:300}
.v-close{padding:10px 26px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
  border-radius:24px;color:var(--muted);font-size:13.5px;font-family:var(--bf);cursor:pointer;transition:all .22s}
.v-close:hover{background:rgba(255,255,255,.1);color:var(--text)}

#file-inp{display:none}

/* ─── RESPONSIVE ─── */
@media(max-height:700px){
  .hero{gap:10px;padding:14px 8px}
  .hero-img{width:60px;height:60px}
  .hero-title{font-size:clamp(26px,7vw,42px);letter-spacing:-1.5px}
  .hero-sub{font-size:12.5px}
  .sug{padding:5px 12px;font-size:11.5px}
  .inp-zone{gap:8px;padding:6px 0 6px}
  textarea#inp{min-height:46px;padding:12px 16px}
}
@media(max-height:600px){
  .hero-sub{display:none}
  .hero-img{width:50px;height:50px}
  .hero-title{font-size:26px}
}
@media(min-height:820px){
  .hero{gap:24px}
  .hero-img{width:100px;height:100px}
  .hero-title{font-size:clamp(52px,9vw,72px)}
  .hero-sub{font-size:15px}
  .sug{padding:8px 18px;font-size:13px}
}


/* Background goes black → white → fades out */


  40%{background:#000}
  70%{background:#fff}
  85%{background:#fff;opacity:1}
  100%{background:#fff;opacity:0;visibility:hidden}
}

/* Title — fades in slowly, holds, then fades to dark */


  20%{opacity:1;transform:scale(1)}
  55%{opacity:1;transform:scale(1)}
  68%{opacity:0;transform:scale(1.02)}
  100%{opacity:0}
}

  50%{background-position:100% 50%}
}






@keyframes fade-in{
  from{opacity:0;visibility:hidden}
  to{opacity:1;visibility:visible}
}

// ─── INTRO ANIMATION ───
(function(){
  const intro=document.getElementById('intro');
  const text=document.getElementById('intro-text');
  if(!intro)return;
  
  // Set body and html bg to BLACK initially (covers iPhone safe-area)
  document.documentElement.style.background='#000';
  document.body.style.background='#000';
  
  // Step 1: at 100ms — show text (fade in 1.2s)
  setTimeout(()=>{text.style.opacity='1'},100);
  
  // Step 2: at 2500ms — brighten EVERYTHING to white (body + html + intro)
  setTimeout(()=>{
    document.documentElement.style.transition='background 1.5s cubic-bezier(.4,0,.2,1)';
    document.body.style.transition='background 1.5s cubic-bezier(.4,0,.2,1)';
    document.documentElement.style.background='#ffffff';
    document.body.style.background='#ffffff';
    intro.style.transition='background 1.5s cubic-bezier(.4,0,.2,1)';
    intro.style.background='#ffffff';
    text.style.transition='opacity 0.8s ease';
    text.style.opacity='0';
  },2500);
  
  // Step 3: at 4500ms — return body+html to dark, fade out white intro
  setTimeout(()=>{
    document.documentElement.style.transition='background 1s cubic-bezier(.4,0,.2,1)';
    document.body.style.transition='background 1s cubic-bezier(.4,0,.2,1)';
    document.documentElement.style.background='#04020a';
    document.body.style.background='#04020a';
    intro.style.transition='opacity 1s cubic-bezier(.4,0,.2,1)';
    intro.style.opacity='0';
  },4500);
  
  // Step 4: at 5600ms — remove intro from DOM, reset transitions
  setTimeout(()=>{
    intro.remove();
    document.documentElement.style.transition='';
    document.body.style.transition='';
  },5600);
})();

// ─── STARS — большие и яркие ───
(()=>{
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  let W,H,stars=[];
  function resize(){W=cv.width=innerWidth*devicePixelRatio;H=cv.height=innerHeight*devicePixelRatio;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';ctx.scale(devicePixelRatio,devicePixelRatio)}
  resize();addEventListener('resize',resize);
  const w=()=>innerWidth,h=()=>innerHeight;
  function mk(){
    return{
      x:Math.random()*w(),
      y:-50-Math.random()*200,
      spd:.5+Math.random()*.9,
      len:60+Math.random()*90,
      a:.35+Math.random()*.35,
      width:.7+Math.random()*1.0,
      tail:.3+Math.random()*.4,
      ang:Math.PI/2+(Math.random()-.5)*.18
    };
  }
  for(let i=0;i<12;i++){const s=mk();s.y=Math.random()*h();stars.push(s)}
  function draw(){
    ctx.clearRect(0,0,w(),h());
    stars.forEach(s=>{
      s.y+=Math.sin(s.ang)*s.spd;
      s.x+=Math.cos(s.ang)*s.spd*.4;
      const tx=s.x-Math.cos(s.ang)*s.len,ty=s.y-Math.sin(s.ang)*s.len;
      const g=ctx.createLinearGradient(tx,ty,s.x,s.y);
      g.addColorStop(0,'rgba(255,200,130,0)');
      g.addColorStop(1-s.tail,'rgba(255,200,130,0)');
      g.addColorStop(.92,`rgba(255,190,110,${s.a*.6})`);
      g.addColorStop(1,`rgba(255,230,180,${s.a})`);
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);
      ctx.strokeStyle=g;ctx.lineWidth=s.width;ctx.lineCap='round';ctx.stroke();
      // Bright head
      ctx.beginPath();ctx.arc(s.x,s.y,s.width*1.3,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,235,190,${s.a*1.1})`;ctx.fill();
      // Outer glow
      ctx.beginPath();ctx.arc(s.x,s.y,s.width*2.5,0,Math.PI*2);
      const rg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.width*2.5);
      rg.addColorStop(0,`rgba(255,200,130,${s.a*.5})`);rg.addColorStop(1,'rgba(255,200,130,0)');
      ctx.fillStyle=rg;ctx.fill();
      if(s.y>h()+30||s.x>w()+30||s.x<-30)Object.assign(s,mk());
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─── STATE ───
const SYS=`You are Selcio, a smart and charismatic AI assistant with access to real-time web search. CRITICAL LANGUAGE RULE: Always respond in the exact same language the user writes in. Russian → Russian only. English → English only. Any other language → that language only. Never switch languages. When web search results are provided use that data to give accurate up-to-date answers and include relevant URLs as markdown links [text](url). Never mention Llama, Groq, Gemini, Tavily or Meta — you are Selcio.`;

let chats=JSON.parse(localStorage.getItem('selcio_chats')||'[]');
let activeId=null,chatStarted=false,pendingImg=null;

function saveChats(){localStorage.setItem('selcio_chats',JSON.stringify(chats))}
function getChat(){return chats.find(c=>c.id===activeId)}
function scrollBot(){const sz=document.getElementById('scroll-zone');requestAnimationFrame(()=>sz.scrollTop=sz.scrollHeight)}

function renderHist(){
  const list=document.getElementById('sb-hist');
  list.querySelectorAll('.grp,.hi').forEach(e=>e.remove());
  const empty=document.getElementById('sb-empty');
  if(!chats.length){empty.style.display='block';return}
  empty.style.display='none';
  const tod=new Date();tod.setHours(0,0,0,0);
  const yes=new Date(tod);yes.setDate(yes.getDate()-1);
  const wk=new Date(tod);wk.setDate(wk.getDate()-7);
  const groups=[{label:'Сегодня',items:[]},{label:'Вчера',items:[]},{label:'На этой неделе',items:[]},{label:'Ранее',items:[]}];
  [...chats].reverse().forEach(c=>{
    const d=new Date(parseInt(c.id));d.setHours(0,0,0,0);
    if(d>=tod)groups[0].items.push(c);
    else if(d>=yes)groups[1].items.push(c);
    else if(d>=wk)groups[2].items.push(c);
    else groups[3].items.push(c);
  });
  groups.forEach(({label,items})=>{
    if(!items.length)return;
    const grp=document.createElement('div');grp.className='grp';
    grp.innerHTML=`<div class="grp-label">${label}</div>`;
    items.forEach(c=>{
      const el=document.createElement('div');
      el.className='hi'+(c.id===activeId?' on':'');
      el.innerHTML=`<div class="hi-dot"></div><span class="hi-t">${c.title}</span><button class="hi-x" onclick="delChat(event,'${c.id}')"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>`;
      el.addEventListener('click',()=>{loadChat(c.id);closeSb()});
      grp.appendChild(el);
    });
    list.appendChild(grp);
  });
}

function loadChat(id){
  activeId=id;const c=getChat();if(!c)return;
  chatStarted=true;
  document.getElementById('hero').style.display='none';
  const msgs=document.getElementById('msgs');msgs.style.display='flex';msgs.innerHTML='';
  document.getElementById('sugs').classList.add('gone');
  document.getElementById('cv').classList.add('hide');
  c.messages.filter(m=>m.role!=='system').forEach(m=>{
    if(typeof m.content==='string')addBub(m.role==='user'?'user':'ai',m.content,false);
    else if(Array.isArray(m.content)){
      const tp=m.content.find(p=>p.type==='text'),ip=m.content.find(p=>p.dataUrl);
      addBub(m.role==='user'?'user':'ai',tp?.text||'',false,ip?.dataUrl||null);
    }
  });
  scrollBot();renderHist();
}

function delChat(e,id){
  e.stopPropagation();chats=chats.filter(c=>c.id!==id);saveChats();
  if(activeId===id)newChat();else renderHist();
}

function newChat(){
  activeId=null;chatStarted=false;
  document.getElementById('hero').style.display='flex';
  const msgs=document.getElementById('msgs');msgs.style.display='none';msgs.innerHTML='';
  document.getElementById('sugs').classList.remove('gone');
  document.getElementById('cv').classList.remove('hide');
  clearImg();closeSb();renderHist();
}

function showChatState(){
  if(chatStarted)return;chatStarted=true;
  document.getElementById('hero').style.display='none';
  document.getElementById('msgs').style.display='flex';
  document.getElementById('sugs').classList.add('gone');
  document.getElementById('cv').classList.add('hide');
}

function ensureChat(text){
  if(!activeId){
    const id=Date.now().toString();
    const title=(text||'Фото').slice(0,40)+((text?.length>40)?'…':'');
    chats.push({id,title,messages:[{role:'system',content:SYS}]});
    activeId=id;renderHist();
  }
}

function fmt(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/`(.*?)`/g,'<code>$1</code>');
}

function addBub(role,text,anim=true,imgUrl=null){
  const c=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'user':'ai');
  if(!anim)d.style.animation='none';
  const av=role==='ai'?`<div class="av ai"><img src="${LOGO}" alt="F"></div>`:`<div class="av usr">Я</div>`;
  const img=imgUrl?`<img src="${imgUrl}" alt="photo">`:'';
  d.innerHTML=`${av}<div class="bub">${img}${fmt(text)}</div>`;
  c.appendChild(d);scrollBot();
}

function mkStream(){
  const c=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg ai';
  const aiAv=Object.assign(document.createElement('div'),{className:'av ai'});
  const aiImg=Object.assign(document.createElement('img'),{src:LOGO,alt:'F'});
  aiAv.appendChild(aiImg);
  const wrap=document.createElement('div');wrap.style.cssText='flex:1;min-width:0;display:flex;flex-direction:column;gap:8px';
  const bub=document.createElement('div');bub.className='bub';
  bub.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  const srcBox=document.createElement('div');srcBox.className='sources';srcBox.style.display='none';
  wrap.appendChild(bub);wrap.appendChild(srcBox);
  d.appendChild(aiAv);d.appendChild(wrap);
  c.appendChild(d);scrollBot();
  let full='',go=false;
  return{
    search(){bub.innerHTML='<span class="searching"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M9 9l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>Ищу в интернете…</span>'},
    add(t){if(!go){bub.innerHTML='';go=true}full+=t;bub.innerHTML=fmt(full)+'<span class="cur"></span>';requestAnimationFrame(()=>scrollBot())},
    addSources(s){if(!s?.length)return;srcBox.style.display='flex';srcBox.style.flexDirection='column';srcBox.style.gap='5px';srcBox.innerHTML='<div class="src-label">Источники</div>';s.slice(0,3).forEach(x=>{const dom=x.url.replace(/https?:\/\//,'').split('/')[0];const a=document.createElement('a');a.className='src-link';a.href=x.url;a.target='_blank';a.rel='noopener';a.innerHTML=`<svg width="11" height="11" viewBox="0 0 11 11" fill="none" style="flex-shrink:0;opacity:.5"><circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.1"/><path d="M5.5 1.5c-1 1.5-1 5.5 0 8M1.5 5.5h8M2 3.5h7M2 7.5h7" stroke="currentColor" stroke-width=".9"/></svg><span class="src-title">${x.title||dom}</span><span class="src-domain">${dom}</span>`;srcBox.appendChild(a)});scrollBot()},
    done(){bub.querySelector('.cur')?.remove();return full}
  };
}

function onFile(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{const url=ev.target.result;pendingImg={base64:url.split(',')[1],mime:file.type,url};document.getElementById('prev-img').src=url;document.getElementById('img-prev').classList.add('show')};
  r.readAsDataURL(file);e.target.value='';
}
function clearImg(){pendingImg=null;document.getElementById('img-prev').classList.remove('show');document.getElementById('prev-img').src=''}
function useSug(btn){inpEl.value=btn.textContent;send()}

async function send(){
  const text=inpEl.value.trim();
  if(!text&&!pendingImg)return;
  inpEl.value='';inpEl.style.height='auto';
  document.getElementById('sbtn').disabled=true;
  showChatState();ensureChat(text);
  const snap=pendingImg;clearImg();
  addBub('user',text||'',true,snap?.url||null);

  if(snap){
    const sb=mkStream();
    try{
      const r=await fetch('/api/vision',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:snap.base64,mimeType:snap.mime,prompt:text||'Describe this image in detail.'})});
      const d=await r.json();
      if(d.error)sb.add('⚠ '+d.error);
      else{for(let i=0;i<d.reply.length;i++){sb.add(d.reply[i]);if(i%3===0)await new Promise(r=>setTimeout(r,7))}}
      const full=sb.done();
      const c=getChat();
      c.messages.push({role:'user',content:[{type:'text',text:text||'Describe image'},{dataUrl:snap.url}]});
      c.messages.push({role:'assistant',content:full});saveChats();
    }catch(e){sb.add('⚠ '+e.message);sb.done()}
    document.getElementById('sbtn').disabled=false;return;
  }

  const c=getChat();
  c.messages.push({role:'user',content:text});saveChats();
  const sb=mkStream();let full='';
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:c.messages})});
    const reader=res.body.getReader(),dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const raw=line.slice(6).trim();if(raw==='[DONE]')continue;
        try{const j=JSON.parse(raw);
          if(j.sources)sb.addSources(j.sources);
          else if(j.searching)sb.search();
          else if(j.token){full+=j.token;sb.add(j.token)}
        }catch{}
      }
    }
    sb.done();c.messages.push({role:'assistant',content:full});saveChats();
  }catch(e){sb.add('⚠ Нет соединения.');sb.done()}
  document.getElementById('sbtn').disabled=false;
}

inpEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
inpEl.addEventListener('input',()=>{inpEl.style.height='auto';inpEl.style.height=Math.min(inpEl.scrollHeight,130)+'px'});

// ─── VOICE ───
let recog=null,voiceOn=false,listening=false;
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function openVoice(){if(!SR){alert('Используй Chrome для голосового режима');return}document.getElementById('vov').classList.add('open');voiceOn=true;setV('Нажми чтобы говорить','')}
function closeVoice(){voiceOn=false;listening=false;if(recog){try{recog.stop()}catch{}recog=null}if(speechSynthesis.speaking)speechSynthesis.cancel();document.getElementById('vov').classList.remove('open');document.getElementById('vorb').classList.remove('listen','speak')}
function setV(s,t){document.getElementById('vstatus').textContent=s;if(t!==undefined)document.getElementById('vtext').textContent=t}
function toggleListen(){if(listening)stopListen();else startListen()}
function startListen(){
  if(!voiceOn)return;listening=true;
  document.getElementById('vorb').classList.add('listen');document.getElementById('vorb').classList.remove('speak');
  setV('Слушаю…','');
  recog=new SR();recog.lang='ru-RU';recog.continuous=false;recog.interimResults=true;
  recog.onresult=e=>{let fin='',int='';for(const r of e.results){if(r.isFinal)fin+=r[0].transcript;else int+=r[0].transcript}setV('Слушаю…',fin||int);if(fin){stopListen();sendVoice(fin)}};
  recog.onerror=()=>{listening=false;document.getElementById('vorb').classList.remove('listen');setV('Нажми чтобы говорить','')};
  recog.onend=()=>{if(listening){listening=false;document.getElementById('vorb').classList.remove('listen');setV('Нажми чтобы говорить','')}};
  recog.start();
}
function stopListen(){listening=false;document.getElementById('vorb').classList.remove('listen');if(recog){try{recog.stop()}catch{}}}

async function sendVoice(text){
  setV('Думаю…',text);showChatState();ensureChat(text);
  addBub('user',text);
  const c=getChat();c.messages.push({role:'user',content:text});saveChats();
  const sb=mkStream();let full='';
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:c.messages})});
    const reader=res.body.getReader(),dec=new TextDecoder();let buf='';
    while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();for(const line of lines){if(!line.startsWith('data: '))continue;const raw=line.slice(6).trim();if(raw==='[DONE]')continue;try{const j=JSON.parse(raw);if(j.sources)sb.addSources(j.sources);else if(j.token){full+=j.token;sb.add(j.token)}}catch{}}}
    sb.done();c.messages.push({role:'assistant',content:full});saveChats();
  }catch(e){full='Ошибка соединения.';sb.add('⚠ '+full);sb.done()}
  if(full&&voiceOn){
    document.getElementById('vorb').classList.add('speak');setV('Отвечаю…','');
    const utt=new SpeechSynthesisUtterance(full.replace(/<[^>]*>/g,'').slice(0,500));
    utt.lang='ru-RU';utt.rate=1.05;
    utt.onend=()=>{document.getElementById('vorb').classList.remove('speak');if(voiceOn)setV('Нажми чтобы говорить','')};
    speechSynthesis.speak(utt);
  }
}
